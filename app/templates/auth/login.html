{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="auth-layout">
  <div class="auth-card">
    <h1>Sign In</h1>
    <p class="muted">Use your username and password to continue.</p>
    <form method="post" class="stack">
      {{ form.hidden_tag() }}
      <label>
        <span>Username</span>
        {{ form.username() }}
      </label>
      <label>
        <span>Password</span>
        {{ form.password() }}
      </label>
      {{ form.submit(class_='btn') }}
    </form>
  </div>
</section>
{% endblock %}
