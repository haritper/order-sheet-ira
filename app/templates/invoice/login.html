{% extends 'base.html' %}
{% block title %}Invoice Login{% endblock %}
{% block content %}
<section class="auth-layout">
  <div class="auth-card">
    <h1>Invoice Module</h1>
    <p class="muted">Admin sign-in required.</p>
    <form method="post" class="stack">
      {% if form %}
        {{ form.hidden_tag() }}
        <label>
          <span>Username</span>
          {{ form.username() }}
        </label>
        <label>
          <span>Password</span>
          {{ form.password() }}
        </label>
        {{ form.submit(class_='btn') }}
      {% else %}
        <label>
          <span>Username</span>
          <input type="text" name="username" required>
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" required>
        </label>
        <button class="btn" type="submit">Login</button>
      {% endif %}
    </form>
  </div>
</section>
{% endblock %}
