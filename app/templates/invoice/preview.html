<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invoice PDF Layout</title>
  <link rel="stylesheet" href="{{ url_for('pricing.static', filename='pricing/style.css') }}">
  <style>
    .invoice-preview-page .shell {
      grid-template-columns: 1fr;
      min-height: 100vh;
    }

    .invoice-preview-page .content {
      max-width: 980px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1.25rem;
      gap: 1rem;
      align-content: start;
    }

    .invoice-preview-page .action-row {
      display: flex;
      justify-content: flex-end;
    }
  </style>
</head>
<body class="invoice-preview-page">
  <div class="shell">
    <main class="content">
      <div class="action-row">
        <a class="button" href="{{ url_for('auth.logout') }}">Logout</a>
      </div>

      <section class="panel">
        <div class="panel-header">
          <p class="eyebrow">Invoice Module</p>
          <h2>Invoice PDF layout is being updated</h2>
        </div>
        <p>The previous invoice preview has been removed. We can now build the new PDF layout from scratch.</p>
      </section>
    </main>
  </div>
</body>
</html>
