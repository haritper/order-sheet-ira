{% extends 'base.html' %}
{% block content %}
<div class="card">
  <div class="section-head">
    <h1>Production Order Workflow</h1>
  </div>
  <p class="muted" style="margin-bottom:14px;">Create, configure, validate and export uniform order sheets with fewer manual steps.</p>
  {% if current_user.is_authenticated %}
    <a class="btn" href="{{ url_for('orders.list_orders') }}">Open Orders</a>
  {% else %}
    <a class="btn" href="{{ url_for('auth.login') }}">Login</a>
  {% endif %}
</div>
{% endblock %}
