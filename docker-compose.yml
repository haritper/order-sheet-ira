services:
  web:
    build: .
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ordersheet
      POSTGRES_PASSWORD: ordersheet
      POSTGRES_DB: ordersheet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx:1.27
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  backup:
    image: postgres:16
    depends_on:
      - db
    volumes:
      - ./data/backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    environment:
      PGPASSWORD: ordersheet
    entrypoint: ["/bin/bash", "-c", "chmod +x /backup.sh && while true; do /backup.sh; sleep 86400; done"]
    restart: unless-stopped

volumes:
  postgres_data:
